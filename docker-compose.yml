version: '3.8'
services:
  bot:
    image: standoff-quiz-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: standoff-quiz-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
      - DB_PATH=/app/data/bot_database.db
      - PROXY_URL=${PROXY_URL:-}
      - AUTO_BROADCAST_ENABLED=${AUTO_BROADCAST_ENABLED:-false}
      - AUTO_BROADCAST_INTERVAL_HOURS=${AUTO_BROADCAST_INTERVAL_HOURS:-4}
      - ADMIN_USER_ID=${ADMIN_USER_ID:-}
      - AUTO_BROADCAST_TYPE=${AUTO_BROADCAST_TYPE:-random}
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    networks:
      - bot-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-network:
    driver: bridge

volumes:
  bot_data:
    name: standoff2_quiz_bot_data
    external: true
  bot_logs:
    name: standoff2_quiz_bot_logs
    external: true